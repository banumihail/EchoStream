<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>EchoStream</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0; padding: 14px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #0f172a; color: #e2e8f0;
      width: 320px;
    }
    h1 {
      font-size: 0.95rem; font-weight: 600; margin: 0 0 10px;
      background: linear-gradient(135deg, #818cf8, #c084fc);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .row { display: flex; gap: 6px; }
    input[type="text"] {
      flex: 1;
      background: rgba(255,255,255,0.06); color: inherit;
      border: 1px solid rgba(255,255,255,0.1); border-radius: 6px;
      padding: 7px 10px; font-size: 0.82rem; outline: none;
    }
    input[type="text"]:focus { border-color: #818cf8; }
    button {
      background: linear-gradient(135deg, #818cf8, #c084fc);
      color: #0f172a; border: 0; border-radius: 6px;
      padding: 7px 14px; font-size: 0.82rem; font-weight: 600; cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .hint { font-size: 0.72rem; color: #94a3b8; margin-top: 6px; }
    .history { margin-top: 12px; max-height: 220px; overflow-y: auto; }
    .item {
      padding: 7px 8px; margin-bottom: 4px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 6px; font-size: 0.78rem;
    }
    .item .name { color: #fff; font-weight: 500; }
    .item .meta { color: #94a3b8; font-size: 0.7rem; margin-top: 2px; }
    .item a { color: #c084fc; text-decoration: none; }
    .item a:hover { text-decoration: underline; }
    .empty { text-align: center; color: #94a3b8; font-size: 0.78rem; padding: 16px 0; }
    .footer { margin-top: 10px; font-size: 0.7rem; color: #94a3b8; text-align: center; }
    .footer a { color: #c084fc; text-decoration: none; }
  </style>
</head>
<body>
  <h1>EchoStream</h1>
  <div class="row">
    <input id="urlInput" type="text" placeholder="Paste a video URL…" />
    <button id="sendBtn">Send</button>
  </div>
  <div class="hint" id="hint">Or right-click any video link on a page.</div>
  <div class="history" id="history"></div>
  <div class="footer">
    Backend: <a href="http://localhost:8000" target="_blank">localhost:8000</a> ·
    Open <a href="http://localhost:5173" target="_blank">dashboard</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
