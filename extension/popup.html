<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>EchoStream</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..600&family=Geist:wght@300..700&family=Geist+Mono:wght@400..600&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: dark;
      --ink-1: #0a0a0a; --ink-2: #101010; --ink-3: #161616;
      --bone: #efece5; --bone-2: #c9c5b8; --bone-dim: #8e897b; --bone-faint: #5a554a;
      --acid: #d6f24c; --acid-deep: #aac934;
      --rule: rgba(255,251,235,0.10); --rule-bright: rgba(255,251,235,0.18);
      --serif: 'Fraunces', Georgia, serif;
      --sans: 'Geist', system-ui, -apple-system, sans-serif;
      --mono: 'Geist Mono', ui-monospace, 'Courier New', monospace;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 16px;
      font-family: var(--sans);
      background: var(--ink-1); color: var(--bone);
      width: 330px;
      background-image: radial-gradient(420px 220px at 100% -40px, rgba(214,242,76,0.06), transparent 60%);
    }

    /* ── header / wordmark ── */
    .head { display: flex; align-items: baseline; gap: 9px; margin-bottom: 14px; }
    .wordmark {
      font-family: var(--serif); font-size: 19px; font-weight: 400;
      letter-spacing: -0.02em; color: var(--bone); line-height: 1;
    }
    .wordmark em { font-style: italic; font-weight: 300; color: var(--acid); }
    .stamp {
      font-family: var(--mono); font-size: 8px; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--bone-faint); border: 1px solid var(--rule-bright); padding: 3px 6px 2px;
      transform: translateY(-1px);
    }

    /* ── input row ── */
    .row { display: flex; gap: 7px; }
    input[type="text"] {
      flex: 1;
      background: var(--ink-2); color: var(--bone);
      border: 1px solid var(--rule); border-radius: 2px;
      padding: 9px 11px; font-size: 12.5px; font-family: var(--sans); outline: none;
      transition: border-color 140ms, box-shadow 140ms;
    }
    input[type="text"]::placeholder { color: var(--bone-faint); }
    input[type="text"]:focus { border-color: var(--acid); box-shadow: 0 0 0 3px rgba(214,242,76,0.10); }
    button {
      background: var(--acid); color: var(--ink-1);
      border: 0; border-radius: 2px;
      padding: 9px 16px; font-size: 11px; font-weight: 700;
      font-family: var(--sans); letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer;
      transition: background 140ms;
    }
    button:hover:not(:disabled) { background: var(--acid-deep); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .hint {
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.04em;
      color: var(--bone-dim); margin-top: 8px;
    }

    /* ── history ── */
    .history { margin-top: 14px; max-height: 230px; overflow-y: auto; }
    .item {
      padding: 9px 10px; margin-bottom: 6px;
      background: var(--ink-2); border: 1px solid var(--rule);
      transition: border-color 140ms;
    }
    .item:hover { border-color: var(--rule-bright); }
    .item .name { color: var(--bone); font-weight: 500; font-size: 12px; word-break: break-all; }
    .item .meta {
      color: var(--bone-dim); font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.04em;
      margin-top: 4px;
    }
    .item a, .footer a { color: var(--acid); text-decoration: none; }
    .item a:hover, .footer a:hover { text-decoration: underline; }
    .empty {
      text-align: center; color: var(--bone-faint); font-family: var(--mono);
      font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; padding: 22px 0;
    }

    /* ── footer ── */
    .footer {
      margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--rule);
      font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.06em;
      color: var(--bone-faint); display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    }
    .footer .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--acid); box-shadow: 0 0 8px var(--acid); }
    .footer .sep { color: var(--bone-faint); }

    /* scrollbar */
    .history::-webkit-scrollbar { width: 6px; }
    .history::-webkit-scrollbar-thumb { background: var(--rule-bright); }
  </style>
</head>
<body>
  <header class="head">
    <span class="wordmark">Echo<em>Stream</em></span>
    <span class="stamp">Send to pipeline</span>
  </header>

  <div class="row">
    <input id="urlInput" type="text" placeholder="Paste a video URL…" />
    <button id="sendBtn">Send</button>
  </div>
  <div class="hint" id="hint">Or right-click any video link on a page.</div>

  <div class="history" id="history"></div>

  <div class="footer">
    <span class="dot"></span> Backend <a href="http://localhost:8000" target="_blank">localhost:8000</a>
    <span class="sep">//</span> <a href="http://localhost:5173" target="_blank">Open dashboard</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
